version: '3.8'

services:
  # JIFAS AI Assistant API
  jifas-api:
    build:
      context: .
      dockerfile: Jifas.Assistant/Dockerfile
    container_name: jifas-assistant-api
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=JifasAssistant;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=true;
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Gemini__Model=gemini-2.0-flash
      - Gemini__BaseUrl=https://generativelanguage.googleapis.com/v1beta/models
      - Qdrant__Enabled=true
      - Qdrant__Url=http://qdrant:6333
      - Qdrant__CollectionName=jifas_kb
      - Qdrant__ApiKey=${QDRANT_API_KEY}
      - Support__HelpDeskEmail=${SUPPORT_EMAIL}
      - Support__HelpDeskPhone=${SUPPORT_PHONE}
    depends_on:
      sqlserver:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - jifas-network
    volumes:
      - ./Logs:/app/Logs
    restart: unless-stopped

  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: jifas-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - jifas-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SQL_SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jifas-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant-storage:/qdrant/storage
      - qdrant-snapshots:/qdrant/snapshots
    networks:
      - jifas-network
    command: ./qdrant --api-key ${QDRANT_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # pgAdmin for SQL Server Management (Optional)
  sql-admin:
    image: dpage/pgadmin4:latest
    container_name: jifas-sql-admin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jababeka.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - jifas-network
    depends_on:
      - sqlserver
    restart: unless-stopped

networks:
  jifas-network:
    driver: bridge

volumes:
  sqlserver-data:
  qdrant-storage:
  qdrant-snapshots:
