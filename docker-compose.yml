services:
  jifas-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jifas-assistant-api
    ports:
      - '8888:8888'
    environment:
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      Gemini__ApiKey: ${Gemini__ApiKey}
      Gemini__Model: ${Gemini__Model}
      Gemini__BaseUrl: ${Gemini__BaseUrl}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8888
      Logging__LogLevel__Default: ${Logging__LogLevel__Default}
      Caching__EnableResponseCache: ${Caching__EnableResponseCache}
      Caching__ResponseCacheDurationHours: ${Caching__ResponseCacheDurationHours}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - jifas-network

networks:
  jifas-network:
    driver: bridge